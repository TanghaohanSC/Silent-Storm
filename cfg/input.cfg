// Base
bind cancel	'ESC'

bind exitgame	'RCTRL' + 'C'
bind exitgame	'LCTRL' + 'C'
bind exitgame	'RCTRL' + 'Q'
bind exitgame	'LCTRL' + 'Q'

bind pause	'PAUSE'
bind screenshot 'SYSRQ'
bind hqscreenshot 'LSHIFT' + 'SYSRQ'
bind hqscreenshot 'RSHIFT' + 'SYSRQ'
bind showfps	'SCROLL'

//
//===========================================================================
// Mouse
bind +cursor_x		'MOUSE_AXIS_X'
bind +cursor_y		'MOUSE_AXIS_Y'
bind +scroll		'MOUSE_AXIS_Z'
bind leftbutton_down	'MOUSE_BUTTON0'
bind !leftbutton_up	'MOUSE_BUTTON0'
bind rightbutton_down	'MOUSE_BUTTON1'
bind !rightbutton_up	'MOUSE_BUTTON1'

bindconfigure		MOUSE_AXIS_X 2.5
bindconfigure		MOUSE_AXIS_Y 2.5
bindconfigure		MOUSE_AXIS_Z 160

//============================================================================
// Camera
bind -camera_zoom	'PG_UP'
bind +camera_zoom	'PG_DOWN'
bind +camera_forward	'UP'    
bind -camera_forward	'DOWN'  
bind +camera_strafe	'RIGHT'
bind -camera_strafe	'LEFT'
bind -camera_pitch	'LCTRL' + 'UP'
bind -camera_pitch	'RCTRL' + 'UP'
bind +camera_pitch	'LCTRL' + 'DOWN'
bind +camera_pitch	'RCTRL' + 'DOWN'
bind -camera_rotate	'LCTRL' + 'RIGHT'
bind -camera_rotate	'RCTRL' + 'RIGHT'
bind +camera_rotate	'LCTRL' + 'LEFT'
bind +camera_rotate	'RCTRL' + 'LEFT'
bind +camera_fps_rotate		'MOUSE_AXIS_X'
bind +camera_fps_pitch		'MOUSE_AXIS_Y'

bind -camera_zoom	'MOUSE_AXIS_Z'
bind -camera_pitch	'MOUSE_BUTTON1' + 'MOUSE_AXIS_Y'
bind -camera_rotate	'MOUSE_BUTTON1' + 'MOUSE_AXIS_X'
bind -camera_strafe	'LCTRL' + 'MOUSE_BUTTON1' + 'MOUSE_AXIS_X'
bind -camera_strafe	'RCTRL' + 'MOUSE_BUTTON1' + 'MOUSE_AXIS_X'
bind +camera_forward	'LCTRL' + 'MOUSE_BUTTON1' + 'MOUSE_AXIS_Y'
bind +camera_forward	'RCTRL' + 'MOUSE_BUTTON1' + 'MOUSE_AXIS_Y'

bind +camera_forward	'MOUSE_BUTTON2' + 'MOUSE_AXIS_Y'
bind -camera_strafe	'MOUSE_BUTTON2' + 'MOUSE_AXIS_X'

